appId: com.snoringdata.writeapp
productName: 打鼾数据-写入工具
directories:
  output: release
  buildResources: src/my_data/icons
files:
  - src/**/*
  - package.json
  - package.json
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.txt"
  - "!node_modules/**/*.h"
  - "!node_modules/**/*.cc"
  - "!node_modules/**/*.cpp"
  - "!node_modules/**/*.c"
  - "!node_modules/**/build/**/*"
  - "!node_modules/**/deps/**/*"
  - "!node_modules/**/test*/**/*"
  - "!node_modules/**/doc*/**/*"
  - "!node_modules/**/example*/**/*"
  - "!node_modules/**/bin/**/*"
  - "!**/.DS_Store"
  - "!**/.gitkeep"
artifactName: "${productName}-${version}-${arch}.${ext}"
asar: true
asarUnpack:
  - node_modules/@serialport/**/*.node
  - node_modules/serialport/**/*.node
compression: maximum
removePackageScripts: true
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: src/my_data/icons/icon.ico
  signAndEditExecutable: false
  requestedExecutionLevel: asInvoker
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  uninstallerIcon: src/my_data/icons/icon.ico
  installerIcon: src/my_data/icons/icon.ico
  uninstallDisplayName: 打鼾数据-写入工具
mac:
  target: dmg
  icon: src/my_data/icons/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
linux:
  target: AppImage
  icon: src/my_data/icons/1024x1024.png
npmRebuild: true
nodeGypRebuild: false
buildDependenciesFromSource: false
electronDownload:
  cache: .electron-cache
